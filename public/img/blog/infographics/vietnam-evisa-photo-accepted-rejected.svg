<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" role="img" aria-label="Accepted and rejected Vietnam eVisa photo requirements 2026 with passport-style examples">
  <rect width="800" height="360" rx="16" fill="#f8faf9"/>
  <text x="400" y="36" text-anchor="middle" fill="#111827" font-family="system-ui,sans-serif" font-size="18" font-weight="700">Vietnam eVisa portrait photo - accepted vs rejected</text>
  <text x="400" y="58" text-anchor="middle" fill="#6b7280" font-family="system-ui,sans-serif" font-size="12">Passport-style headshot on a plain light background</text>
  <g transform="translate(48,80)">
    <rect width="220" height="250" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
    <text x="110" y="28" text-anchor="middle" fill="#065f46" font-family="system-ui,sans-serif" font-size="14" font-weight="700">Accepted</text>
    <rect x="70" y="48" width="80" height="100" rx="40" fill="#fff" stroke="#d1d5db"/>
    <circle cx="110" cy="78" r="22" fill="#fde68a"/>
    <ellipse cx="110" cy="118" rx="28" ry="20" fill="#93c5fd"/>
    <text x="110" y="168" text-anchor="middle" fill="#374151" font-size="10" font-family="system-ui,sans-serif">Plain white/off-white</text>
    <text x="110" y="184" text-anchor="middle" fill="#374151" font-size="10" font-family="system-ui,sans-serif">Face forward, eyes open</text>
    <text x="110" y="200" text-anchor="middle" fill="#374151" font-size="10" font-family="system-ui,sans-serif">No filters or sunglasses</text>
    <text x="110" y="224" text-anchor="middle" fill="#6b7280" font-size="10" font-family="system-ui,sans-serif">Recent likeness</text>
  </g>
  <g transform="translate(290,80)">
    <rect width="220" height="250" rx="12" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
    <text x="110" y="28" text-anchor="middle" fill="#991b1b" font-family="system-ui,sans-serif" font-size="14" font-weight="700">Rejected</text>
    <rect x="70" y="48" width="80" height="100" rx="40" fill="#fef3c7" stroke="#d1d5db"/>
    <circle cx="110" cy="78" r="22" fill="#fde68a" opacity="0.7"/>
    <rect x="88" y="70" width="44" height="12" rx="6" fill="#1f2937"/>
    <text x="110" y="168" text-anchor="middle" fill="#374151" font-size="10" font-family="system-ui,sans-serif">Busy background</text>
    <text x="110" y="184" text-anchor="middle" fill="#374151" font-size="10" font-family="system-ui,sans-serif">Selfie angle / shadows</text>
    <text x="110" y="200" text-anchor="middle" fill="#374151" font-size="10" font-family="system-ui,sans-serif">Sunglasses or filters</text>
    <text x="110" y="224" text-anchor="middle" fill="#6b7280" font-size="10" font-family="system-ui,sans-serif">Face too small in frame</text>
  </g>
  <g transform="translate(532,80)">
    <rect width="220" height="250" rx="12" fill="#fff7ed" stroke="#f59e0b" stroke-width="2"/>
    <text x="110" y="28" text-anchor="middle" fill="#92400e" font-family="system-ui,sans-serif" font-size="14" font-weight="700">Common fix</text>
    <text x="110" y="80" text-anchor="middle" fill="#374151" font-size="11" font-family="system-ui,sans-serif">Stand 1 m from a</text>
    <text x="110" y="98" text-anchor="middle" fill="#374151" font-size="11" font-family="system-ui,sans-serif">plain white wall</text>
    <text x="110" y="130" text-anchor="middle" fill="#374151" font-size="11" font-family="system-ui,sans-serif">Shoot at eye level</text>
    <text x="110" y="162" text-anchor="middle" fill="#374151" font-size="11" font-family="system-ui,sans-serif">Export JPEG at</text>
    <text x="110" y="180" text-anchor="middle" fill="#374151" font-size="11" font-family="system-ui,sans-serif">portal pixel size</text>
    <text x="110" y="220" text-anchor="middle" fill="#0d5c4f" font-size="11" font-weight="600" font-family="system-ui,sans-serif">See full photo guide</text>
  </g>
</svg>
