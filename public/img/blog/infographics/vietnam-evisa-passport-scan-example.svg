<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" role="img" aria-label="Clear passport bio page scan example for Vietnam eVisa Requirements 2026">
  <rect width="800" height="340" rx="16" fill="#f8faf9"/>
  <text x="400" y="36" text-anchor="middle" fill="#111827" font-family="system-ui,sans-serif" font-size="18" font-weight="700">Passport bio-page scan quality</text>
  <text x="400" y="58" text-anchor="middle" fill="#6b7280" font-family="system-ui,sans-serif" font-size="12">Upload a flat, color scan - not a cropped phone photo of one corner</text>
  <g transform="translate(48,80)">
    <rect width="320" height="220" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
    <text x="160" y="28" text-anchor="middle" fill="#065f46" font-family="system-ui,sans-serif" font-size="14" font-weight="700">Good scan</text>
    <rect x="40" y="48" width="240" height="140" rx="6" fill="#fff" stroke="#d1d5db"/>
    <rect x="56" y="64" width="72" height="88" rx="4" fill="#e5e7eb"/>
    <text x="92" y="112" text-anchor="middle" fill="#9ca3af" font-size="10" font-family="system-ui,sans-serif">PHOTO</text>
    <rect x="140" y="72" width="120" height="8" rx="2" fill="#d1d5db"/>
    <rect x="140" y="88" width="100" height="6" rx="2" fill="#e5e7eb"/>
    <rect x="140" y="102" width="110" height="6" rx="2" fill="#e5e7eb"/>
    <rect x="56" y="168" width="208" height="10" rx="2" fill="#374151"/>
    <text x="160" y="186" text-anchor="middle" fill="#6b7280" font-size="10" font-family="system-ui,sans-serif">MRZ lines readable</text>
    <text x="160" y="206" text-anchor="middle" fill="#374151" font-size="11" font-family="system-ui,sans-serif">All corners visible, no glare</text>
  </g>
  <g transform="translate(432,80)">
    <rect width="320" height="220" rx="12" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
    <text x="160" y="28" text-anchor="middle" fill="#991b1b" font-family="system-ui,sans-serif" font-size="14" font-weight="700">Avoid</text>
    <rect x="60" y="48" width="200" height="140" rx="6" fill="#fff" stroke="#d1d5db"/>
    <rect x="80" y="64" width="160" height="108" rx="4" fill="#f3f4f6" stroke="#d1d5db" stroke-dasharray="4 4"/>
    <text x="160" y="120" text-anchor="middle" fill="#9ca3af" font-size="11" font-family="system-ui,sans-serif">Cropped / blurry</text>
    <text x="160" y="206" text-anchor="middle" fill="#374151" font-size="11" font-family="system-ui,sans-serif">Fingers, shadows, or cut-off MRZ</text>
  </g>
</svg>
